<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Getting Started — FxLinux Advanced</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

/* === GLOBAL === */
body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    display: flex;
    background: #121212;
    color: #e0e0e0;
    line-height: 1.6;
}

a {
    color: #4fc3f7;
    text-decoration: none;
    transition: 0.3s;
}

a:hover {
    text-decoration: underline;
}

/* === SIDEBAR === */
.sidebar {
    width: 250px;
    min-width: 250px;
    background: #1e1e1e;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    padding: 20px;
    box-sizing: border-box;
    overflow-y: auto;
}

.sidebar h2 {
    color: #4fc3f7;
    margin-bottom: 1em;
}

.sidebar ul {
    list-style: none;
    padding-left: 0;
}

.sidebar li {
    margin: 10px 0;
}

.sidebar li a {
    display: block;
    padding: 6px 10px;
    border-radius: 5px;
}

.sidebar li a:hover {
    background: #333;
}

/* === CONTENT === */
.content {
    margin-left: 250px;
    padding: 30px;
    max-width: 900px;
    width: 100%;
}

h1 {
    color: #4fc3f7;
    text-align: center;
    margin-bottom: 20px;
}

h2 {
    border-bottom: 2px solid #4fc3f7;
    padding-bottom: 5px;
    margin-top: 2em;
    color: #fff;
}

pre {
    background: #1e1e1e;
    padding: 10px;
    border-radius: 5px;
    overflow-x: auto;
    color: #b0bec5;
}

.btn {
    display: inline-block;
    background: #4fc3f7;
    color: #121212;
    padding: 10px 20px;
    margin: 10px 0;
    border-radius: 5px;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #0288d1;
}

.lang-switcher {
    text-align: right;
    margin-bottom: 20px;
}

.lang-switcher button {
    background: #4fc3f7;
    color: #121212;
    border: none;
    padding: 6px 12px;
    margin-left: 5px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.lang-switcher button:hover {
    background: #0288d1;
}

.lang-switcher button.active {
    background: #0288d1;
    border: 2px solid #fff;
}

footer {
    text-align: center;
    margin: 50px 0 20px 0;
    color: #777;
    font-size: 0.9em;
}

/* === RESPONSIVE === */
@media(max-width:800px) {
    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        margin-bottom: 20px;
    }
    .content {
        margin-left: 0;
        padding: 20px;
    }
}
</style>
</head>
<body>

<div class="sidebar">
    <h2 id="sidebar-title">Documentation</h2>
    <ul>
        <li><a href="./" id="nav-getting">Getting Started</a></li>
    </ul>
    <div class="lang-switcher">
        <button onclick="setLang('en')" id="btn-en" class="active">EN</button>
        <button onclick="setLang('fr')" id="btn-fr">FR</button>
    </div>
</div>

<div class="content">
    <h1 id="title">Getting Started — FxLinux Advanced</h1>

    <h2 id="getting-started-heading">Getting Started</h2>
    <div id="getting-started-content"></div>

    <footer id="footer">&copy; 2025 Satanas1275 | Made with ❤️</footer>
</div>

<script>
const content = {
    en: {
        sidebarTitle: "Documentation",
        title: "Getting Started — FxLinux Advanced",
        gettingStarted: "Getting Started",
        gettingContent: `
<p>To start developing applications for FxLinux Advanced, follow these steps:</p>
<ol>
    <li>Download the development template here:
        <ul>
            <li><a href="https://satanas1275.github.io/CasioGraph-projects/FxLinuxAdvanced/repo/template.zip" class="btn">Download Template</a></li>
        </ul>
    </li>
    <li>Extract the template to your desired location.</li>
    <li>Develop your <strong>.fla</strong> application using the template structure.</li>
    <li>Test your application using the FxLinux Advanced interpreter.</li>
    <li>Submit your application to the official repository:
        <ul>
            <li><a href="https://satanas1275.github.io/CasioGraph-projects/FxLinuxAdvanced/repo/" target="_blank">FxLinux Advanced Repository</a></li>
        </ul>
    </li>
    <li>Follow the repository guidelines for submission and contribution.</li>
</ol>`
    },
    fr: {
        sidebarTitle: "Documentation",
        title: "Pour Commencer — FxLinux Advanced",
        gettingStarted: "Pour Commencer",
        gettingContent: `
<p>Pour commencer à développer des applications pour FxLinux Advanced, suivez ces étapes :</p>
<ol>
    <li>Téléchargez le template de développement ici :
        <ul>
            <li><a href="https://satanas1275.github.io/CasioGraph-projects/FxLinuxAdvanced/repo/template.zip" class="btn">Télécharger Template</a></li>
        </ul>
    </li>
    <li>Extrayez le template à l'endroit souhaité.</li>
    <li>Développez votre application <strong>.fla</strong> en utilisant la structure du template.</li>
    <li>Testez votre application avec l'interpréteur FxLinux Advanced.</li>
    <li>Soumettez votre application au répertoire officiel :
        <ul>
            <li><a href="https://satanas1275.github.io/CasioGraph-projects/FxLinuxAdvanced/repo/" target="_blank">Répertoire FxLinux Advanced</a></li>
        </ul>
    </li>
    <li>Suivez les directives du répertoire pour la soumission et la contribution.</li>
</ol>`
    }
}

function setLang(lang) {
    const c = content[lang];
    
    // Update buttons state
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
    
    document.getElementById('sidebar-title').innerHTML = c.sidebarTitle;
    document.getElementById('title').innerHTML = c.title;
    document.getElementById('getting-started-heading').innerHTML = c.gettingStarted;
    document.getElementById('getting-started-content').innerHTML = c.gettingContent;
}

// Default language
setLang('en');
</script>

</body>
</html>
